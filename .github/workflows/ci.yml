name: CI

on:
  push:
  pull_request:

jobs:
  progresslab:
    runs-on: ubuntu-latest
    services:
      mongo:
        image: mongo:7
        ports:
          - 27017:27017
    defaults:
      run:
        working-directory: ProgressLab
    env:
      MONGODB_URI: mongodb://127.0.0.1:27017/progresslab_ci
      # Seed-Skript erwartet eine bewusste Bestätigung, damit Produktiv-DBs
      # nicht versehentlich gelöscht werden (siehe scripts/seed.ts). In der
      # ephemeren CI-Mongo ist das Bestätigen explizit gewollt.
      PL_SEED_CONFIRM: '1'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ProgressLab/package-lock.json
      - run: npm ci
      - run: npm run check
      - run: npm run lint
      - run: npm run test:unit
      - run: npm run build
      - run: npx playwright install --with-deps chromium
      - run: npm run seed
      - run: npm run test:e2e
